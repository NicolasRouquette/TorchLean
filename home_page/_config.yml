# Site settings
# These are used to personalize the site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: TorchLean
#email: your-email@example.com
description: "Lean 4 tools for neural-network semantics, runtime experiments, and verification."
# GitHub Pages for a project repo is hosted at: https://<org>.github.io/<repo>/
baseurl: "/TorchLean" # the subpath of your site, e.g. /blog
url: "https://lean-dojo.github.io" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username:
github_username: lean-dojo
repository: lean-dojo/TorchLean
repository_url: "https://github.com/lean-dojo/TorchLean"
repository_name: "TorchLean"
project_tagline: "Lean 4 tools for neural-network semantics, runtime experiments, and verification."
build_revision: "local"

# Build settings
remote_theme: pages-themes/cayman@v0.2.0 
plugins:
  - jekyll-remote-theme
